<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> OR-Operator </title>
</head>
<body>
    <h1>JavaScript Bitwise Operators</h1>
<h2>The | (OR) Operator</h2>

<p id="demo"></p>

<script>
    let x = 5 | 1;
    document.getElementById('demo').innerHTML= "5 OR 1 is " + x;
    

</script>

</body>
</html>
