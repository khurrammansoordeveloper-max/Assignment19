<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum- Add Function</title>
</head>
<body>
    <h1>JavaScript Functions</h1>

<p>A function can be used many times.</p>

<p id="demo"></p>


<script>
function add (a ,b) {
    return a + b;
}
let sum1 = add (5 , 5);
let sum2 = add (50 , 50);
document.getElementById('demo').innerHTML = 
"The results are " + sum1 + " and " + sum2;

</script>
</body>
</html>
