<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Array-Loop </title>
</head>
<body>
    <h1> Array-Loop </h1>
    <p id="demo"></p>

<script>
let text = "";

Array.from({length: 10}, (_, i) => i + 1)
     .reverse()
     .forEach(num => {
        text += "The number is " + num + "<br>";
     });

document.getElementById('demo').innerHTML = text;
</script>
</body>
</html>
